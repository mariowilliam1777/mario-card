<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mario William</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
--gold:#D4AF37;
--gold2:#f4d97a;
--black:#050505;
--card:#111111;
--text:#ffffff;
--muted:#9b9b9b;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:white;
font-family:Inter,sans-serif;
overflow-x:hidden;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px 15px;
position:relative;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at center,
rgba(212,175,55,.08),
transparent 40%);
pointer-events:none;
}

#particles{
position:fixed;
inset:0;
z-index:0;
}

.container{
width:100%;
max-width:450px;
position:relative;
z-index:5;
}

.card{
background:rgba(12,12,12,.78);
backdrop-filter:blur(30px);
border:1px solid rgba(212,175,55,.15);
padding:40px 25px;
border-radius:24px;
box-shadow:
0 20px 60px rgba(0,0,0,.7),
0 0 50px rgba(212,175,55,.03);
overflow:hidden;
}

.logo-wrap{
display:flex;
justify-content:center;
margin-bottom:20px;
opacity:0;
transform:translateY(50px) scale(.9);
animation:logoReveal 1.5s forwards;
}

.logo{
width:100%;
max-width:320px;
filter:
drop-shadow(0 0 10px rgba(212,175,55,.2))
drop-shadow(0 0 40px rgba(212,175,55,.1));
}

.quote{
font-family:"Cormorant Garamond",serif;
font-size:1.35rem;
text-align:center;
font-style:italic;
line-height:1.4;
color:#d6d6d6;
margin-top:10px;
margin-bottom:35px;

opacity:0;
transform:translateY(20px);

animation:fadeUp 1s forwards;
animation-delay:1.2s;
}

.divider{
width:70px;
height:1px;
background:var(--gold);
margin:20px auto;
opacity:.5;
}

.action-list{
display:flex;
flex-direction:column;
gap:16px;
}

.action-card{
display:flex;
align-items:center;
padding:18px;
background:rgba(255,255,255,.02);
border:1px solid rgba(255,255,255,.06);
border-radius:18px;
text-decoration:none;
color:white;
transition:.4s;
position:relative;
overflow:hidden;

opacity:0;
transform:translateX(-30px);
}

.action-card:nth-child(1){
animation:cardIn .8s forwards;
animation-delay:1.7s;
}

.action-card:nth-child(2){
animation:cardIn .8s forwards;
animation-delay:1.9s;
}

.action-card:nth-child(3){
animation:cardIn .8s forwards;
animation-delay:2.1s;
}

.action-card:nth-child(4){
animation:cardIn .8s forwards;
animation-delay:2.3s;
}

.action-card::before{
content:"";
position:absolute;
left:-120%;
top:0;
width:100%;
height:100%;
background:linear-gradient(
90deg,
transparent,
rgba(212,175,55,.15),
transparent
);
transition:.8s;
}

.action-card:hover::before{
left:120%;
}

.action-card:hover{
transform:translateY(-5px);
border-color:var(--gold);
box-shadow:
0 0 20px rgba(212,175,55,.15),
0 0 50px rgba(212,175,55,.08);
}

.icon{
width:58px;
height:58px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
font-size:1.2rem;
color:var(--gold);
background:rgba(212,175,55,.08);
margin-right:15px;
transition:.4s;
}

.action-card:hover .icon{
transform:rotate(10deg) scale(1.15);
box-shadow:0 0 20px rgba(212,175,55,.3);
}

.text h3{
font-size:1rem;
font-weight:500;
}

.text p{
font-size:.8rem;
color:#a5a5a5;
margin-top:4px;
}

.save-btn{
margin-top:25px;
width:100%;
height:60px;
border:none;
border-radius:18px;
cursor:pointer;
font-size:.9rem;
font-weight:700;
letter-spacing:2px;
background:linear-gradient(
135deg,
var(--gold),
var(--gold2)
);

color:black;

opacity:0;
animation:fadeUp 1s forwards;
animation-delay:2.8s;

transition:.4s;
}

.save-btn:hover{
transform:translateY(-3px);
box-shadow:
0 0 30px rgba(212,175,55,.3);
}

@keyframes logoReveal{
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes cardIn{
to{
opacity:1;
transform:translateX(0);
}
}

</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="container">

<div class="card">

<div class="logo-wrap">
<img src="logo.jpg" class="logo">
</div>

<div class="action-list">

<a href="tel:+201211121713" class="action-card">
<div class="icon">
<i class="fas fa-phone"></i>
</div>
<div class="text">
<h3>Call Me</h3>
<p>Direct Contact</p>
</div>
</a>

<a href="https://wa.me/201211121713" class="action-card">
<div class="icon">
<i class="fab fa-whatsapp"></i>
</div>
<div class="text">
<h3>WhatsApp</h3>
<p>Quick Conversation</p>
</div>
</a>

<a href="https://www.instagram.com/mario_hossam" class="action-card">
<div class="icon">
<i class="fab fa-instagram"></i>
</div>
<div class="text">
<h3>Instagram</h3>
<p>Follow My Journey</p>
</div>
</a>

<a href="mailto:mariohossam16@gmail.com" class="action-card">
<div class="icon">
<i class="fas fa-envelope"></i>
</div>
<div class="text">
<h3>Email</h3>
<p>Professional Contact</p>
</div>
</a>

</div>

<button class="save-btn" onclick="downloadVCard()">
SAVE CONTACT
</button>

</div>

</div>

<script>

function downloadVCard(){

const vcard=`BEGIN:VCARD
VERSION:3.0
FN:Mario William
TEL:+201211121713
EMAIL:mariohossam16@gmail.com
END:VCARD`;

const blob=new Blob([vcard],{type:'text/vcard'});
const url=URL.createObjectURL(blob);

const a=document.createElement('a');
a.href=url;
a.download='Mario_William.vcf';
a.click();

URL.revokeObjectURL(url);
}

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let particles=[];

for(let i=0;i<35;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
vx:(Math.random()-.5)*0.15,
vy:(Math.random()-.5)*0.15
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

p.x+=p.vx;
p.y+=p.vy;

if(p.x<0)p.x=canvas.width;
if(p.x>canvas.width)p.x=0;

if(p.y<0)p.y=canvas.height;
if(p.y>canvas.height)p.y=0;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="rgba(212,175,55,.18)";
ctx.fill();

});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
